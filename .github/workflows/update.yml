name: Update Sports Calendars

on:
  schedule:
    # Runs automatically every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Enables a manual run button in the dashboard

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run Script
      run: python generate_calendars.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'SportsCalBot'
        git config --global user.email 'bot@sportscal.com'
        git add *.ics
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update league schedules" && git push)
